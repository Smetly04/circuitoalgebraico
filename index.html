<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Algebraico 3x3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #030712;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #contenedor-juego {
            position: relative;
            background: linear-gradient(135deg, #2c313d 0%, #171a22 50%, #0a0c10 100%);
            border: 6px solid #414a5c;
            border-radius: 24px;
            padding: 25px 20px 20px 20px;
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.2), inset 0 0 25px rgba(0, 0, 0, 0.95);
            transition: transform 0.1s ease;
        }

        canvas {
            display: block;
            border-radius: 12px;
            border: 4px solid #06080b;
            background-color: #040507;
        }

        #panel-interactivo {
            margin-top: 15px;
            background: rgba(13, 15, 20, 0.85);
            border: 2px solid #222933;
            border-radius: 14px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .titulo-seccion { color: rgba(255, 255, 255, 0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .inputs-container { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .grupo-input { display: flex; align-items: center; gap: 8px; }
        .mini-figura { width: 16px; height: 16px; border-radius: 4px; }
        .mini-figura.verde { border-radius: 50%; background-color: #2ecc71; }
        .mini-figura.azul { background-color: #3498db; }
        .mini-figura.rojo { width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; border-bottom: 16px solid #e74c3c; background: none; }
        
        .caja-respuesta { width: 55px; height: 35px; background-color: #05070a; border: 2px solid #34495e; border-radius: 6px; color: #00ffcc; font-size: 16px; font-weight: bold; text-align: center; }
        
        .botones-grupo { display: flex; gap: 15px; }
        .btn-panel { padding: 10px 20px; font-size: 13px; font-weight: bold; text-transform: uppercase; border-radius: 8px; cursor: pointer; border: none; }
        .btn-validar { background: linear-gradient(180deg, #00ffcc 0%, #00a381 100%); color: #05070a; }
        .btn-saltar { background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); color: #ffffff; }
        .btn-saltar:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* NUEVO EFECTO MEJORADO */
        .warp-speed { animation: saltoHiperespacio 0.6s ease-in-out forwards; }
        @keyframes saltoHiperespacio { 
            0% { transform: scale(1) translateX(0); filter: brightness(1) blur(0px); }
            15% { transform: scale(0.95) translateX(-10px); filter: brightness(2) blur(1px); }
            30% { transform: scale(0.98) translateX(10px); filter: brightness(1.5); }
            45% { transform: scale(0.95) translateX(-5px); filter: brightness(2) blur(1px); }
            60% { transform: scale(0.98) translateX(5px); filter: brightness(1.5); }
            100% { transform: scale(1) translateX(0); filter: brightness(1) blur(0px); }
        }
    </style>
</head>
<body>

    <div id="contenedor-juego">
        <canvas id="canvasJuego" width="780" height="540"></canvas>

        <div id="panel-interactivo">
            <div class="titulo-seccion">Escribe tus respuestas</div>
            <div class="inputs-container">
                <div class="grupo-input"> <div class="mini-figura verde"></div> <input type="number" id="inputCirculo" class="caja-respuesta" placeholder="0"> </div>
                <div class="grupo-input"> <div class="mini-figura azul"></div> <input type="number" id="inputCuadrado" class="caja-respuesta" placeholder="0"> </div>
                <div class="grupo-input"> <div class="mini-figura rojo"></div> <input type="number" id="inputTriangulo" class="caja-respuesta" placeholder="0"> </div>
            </div>
            
            <div class="botones-grupo">
                <button class="btn-panel btn-validar" onclick="comprobarCalibracion()">Validar Circuito</button>
                <button id="btnSiguiente" class="btn-panel btn-saltar" onclick="avanzarNivel()" disabled>Siguiente Nivel ➔</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
